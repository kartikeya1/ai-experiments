<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyagr — Premium Itinerary Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --bg4: #22222f;
  --border: #2a2a3a;
  --border2: #3a3a4f;
  --text: #e8e8f0;
  --text2: #9898b0;
  --text3: #5a5a70;
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --accent3: #8fb4c8;
  --danger: #c86868;
  --success: #68c888;
  --warn: #c8a468;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow2: 0 2px 8px rgba(0,0,0,0.3);
  --radius: 8px;
  --radius2: 12px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --transition: 0.18s ease;
}
[data-theme="light"] {
  --bg: #f5f3ee;
  --bg2: #eeebe3;
  --bg3: #e5e0d5;
  --bg4: #d8d2c5;
  --border: #c8c0b0;
  --border2: #b0a898;
  --text: #1a1a22;
  --text2: #4a4a5a;
  --text3: #8a8a9a;
  --accent: #8a6830;
  --accent2: #a07838;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
  --shadow2: 0 2px 8px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{display:flex;align-items:center;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:16px;z-index:100}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:280px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width var(--transition)}
#sidebar.collapsed{width:0}
#canvas{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
#panel{width:320px;border-left:1px solid var(--border);background:var(--bg2);overflow-y:auto;flex-shrink:0;transition:width var(--transition)}
#panel.hidden{width:0;overflow:hidden}

/* HEADER */
.brand{font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:0.05em;color:var(--accent);cursor:pointer;white-space:nowrap}
.brand span{color:var(--text3);font-size:13px;font-weight:300;font-family:var(--font-body);margin-left:6px;letter-spacing:0.15em;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:400;transition:all var(--transition);white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0a0a0f;font-weight:500}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.ghost{border-color:transparent}
.btn.ghost:hover{background:var(--bg3)}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:rgba(200,104,104,0.1)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.icon{padding:6px;width:32px;height:32px;justify-content:center}
.mode-toggle{display:flex;background:var(--bg3);border-radius:var(--radius);padding:2px;border:1px solid var(--border)}
.mode-toggle .btn{border:none;background:transparent;padding:4px 12px;font-size:12px;border-radius:6px}
.mode-toggle .btn.active{background:var(--accent);color:#0a0a0f}
kbd{display:inline-block;padding:1px 5px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}

/* SIDEBAR */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-header h3{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text2)}
.trip-meta{padding:16px;border-bottom:1px solid var(--border)}
.trip-title-input{width:100%;background:transparent;border:none;color:var(--text);font-family:var(--font-display);font-size:18px;font-weight:600;outline:none;padding:0;caret-color:var(--accent)}
.trip-title-input::placeholder{color:var(--text3)}
.trip-subtitle{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--font-body)}
.field-row{display:flex;gap:8px;margin-top:8px}
.field-mini{flex:1;display:flex;flex-direction:column;gap:3px}
.field-mini label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.field-mini input,.field-mini select,.field-mini textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:12px;padding:5px 8px;border-radius:6px;outline:none;transition:border-color var(--transition)}
.field-mini input:focus,.field-mini select:focus,.field-mini textarea:focus{border-color:var(--accent)}
.field-mini select option{background:var(--bg3)}
.field-mini textarea{resize:vertical;min-height:60px;font-size:12px}
.sidebar-sections{flex:1;overflow-y:auto;padding:8px}
.section-nav-item{display:flex;align-items:center;padding:8px 10px;border-radius:var(--radius);cursor:pointer;gap:8px;transition:background var(--transition);color:var(--text2);font-size:13px}
.section-nav-item:hover{background:var(--bg3);color:var(--text)}
.section-nav-item.active{background:rgba(200,169,110,0.12);color:var(--accent)}
.section-nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);text-align:center;line-height:1.4}

/* CANVAS */
.canvas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.canvas-title{font-family:var(--font-display);font-size:28px;font-weight:300;color:var(--text);letter-spacing:0.02em}
.canvas-title em{color:var(--accent);font-style:italic}
.section-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:16px;overflow:hidden;transition:box-shadow var(--transition);animation:fadeIn 0.2s ease}
.section-block.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(200,169,110,0.2)}
.section-block.dragging{opacity:0.5;transform:rotate(1deg)}
.section-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:10px;border-bottom:1px solid var(--border);background:var(--bg3);position:relative}
.section-header:hover .section-actions{opacity:1}
.section-drag-handle{color:var(--text3);cursor:grab;font-size:16px;flex-shrink:0}
.section-drag-handle:active{cursor:grabbing}
.section-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.section-name-input{background:transparent;border:none;color:var(--text);font-family:var(--font-display);font-size:16px;font-weight:600;outline:none;flex:1;caret-color:var(--accent);min-width:0}
.section-name-input::placeholder{color:var(--text3)}
.section-meta{font-size:11px;color:var(--text3);white-space:nowrap}
.section-actions{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity var(--transition)}
.section-toggle{color:var(--text3);font-size:12px;transition:transform var(--transition);margin-left:4px}
.section-toggle.collapsed{transform:rotate(-90deg)}
.section-body{padding:12px}
.section-body.hidden{display:none}
.section-notes{padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(200,169,110,0.04)}
.section-notes textarea{width:100%;background:transparent;border:none;color:var(--text2);font-family:var(--font-body);font-size:12px;outline:none;resize:none;line-height:1.5}
.section-notes textarea::placeholder{color:var(--text3)}

/* ITEMS */
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;transition:all var(--transition);position:relative;animation:fadeIn 0.2s ease}
.item-card:hover{border-color:var(--border2);box-shadow:var(--shadow2)}
.item-card.active-alt{border-color:var(--accent);background:rgba(200,169,110,0.04)}
.item-card.dragging{opacity:0.4;transform:scale(0.98)}
.item-card.drag-over-top{border-top:2px solid var(--accent)}
.item-card.drag-over-bottom{border-bottom:2px solid var(--accent)}
.item-header{display:flex;align-items:center;padding:10px 12px;gap:8px;cursor:pointer}
.item-header:hover .item-actions{opacity:1}
.item-drag-handle{color:var(--text3);cursor:grab;font-size:14px;flex-shrink:0}
.item-drag-handle:active{cursor:grabbing}
.item-emoji{font-size:18px;flex-shrink:0;cursor:pointer}
.item-info{flex:1;min-width:0}
.item-title-input{background:transparent;border:none;color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:500;outline:none;width:100%;caret-color:var(--accent)}
.item-title-input::placeholder{color:var(--text3)}
.item-meta-row{display:flex;align-items:center;gap:8px;margin-top:2px;flex-wrap:wrap}
.item-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:11px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.item-time-badge{background:rgba(143,180,200,0.1);border-color:rgba(143,180,200,0.3);color:var(--accent3)}
.item-loc-badge{background:rgba(200,169,110,0.08);border-color:rgba(200,169,110,0.2);color:var(--accent)}
.item-actions{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity var(--transition);flex-shrink:0}
.item-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer}
.conflict-badge{color:var(--warn);font-size:12px;cursor:help}
.spanning-badge{color:var(--accent3);font-size:11px;background:rgba(143,180,200,0.1);padding:1px 6px;border-radius:8px}
.item-body{padding:0 12px 10px;display:none}
.item-body.open{display:block}
.item-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-group{display:flex;flex-direction:column;gap:3px}
.field-group.full{grid-column:1/-1}
.field-group label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.field-group input,.field-group select,.field-group textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:12px;padding:6px 8px;border-radius:6px;outline:none;transition:border-color var(--transition);width:100%}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{border-color:var(--accent)}
.field-group select option{background:var(--bg2)}
.field-group textarea{resize:vertical;min-height:80px;font-size:12px;line-height:1.5}
.attachments{margin-top:8px}
.attachment-item{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg3);border-radius:6px;margin-bottom:4px;font-size:12px}
.attachment-item a{color:var(--accent);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attachment-item a:hover{color:var(--accent2)}
.add-attachment{display:flex;gap:6px;margin-top:4px}
.add-attachment input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:6px;outline:none}
.alternatives{margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.alternatives-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.alt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;margin-bottom:6px;position:relative}
.alt-card.active{border-color:var(--success);background:rgba(104,200,136,0.05)}
.alt-active-btn{position:absolute;top:6px;right:6px;font-size:11px;padding:2px 8px}
.alt-title-input{background:transparent;border:none;color:var(--text);font-size:12px;font-weight:500;outline:none;width:calc(100% - 70px)}
.alt-notes{width:100%;background:transparent;border:none;color:var(--text2);font-size:11px;outline:none;resize:none;margin-top:4px;line-height:1.4}
.add-alt-btn{font-size:12px;color:var(--text3);cursor:pointer;background:none;border:1px dashed var(--border);border-radius:6px;padding:4px 10px;width:100%;text-align:center;transition:all var(--transition)}
.add-alt-btn:hover{border-color:var(--accent);color:var(--accent)}
.add-item-row{display:flex;gap:6px;padding:8px;border-top:1px dashed var(--border);margin-top:4px}
.item-type-quick{display:flex;gap:4px;flex-wrap:wrap}
.quick-type-btn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;transition:all var(--transition)}
.quick-type-btn:hover{border-color:var(--accent);color:var(--accent)}

/* PANEL */
.panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-header h3{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:0.05em}
.panel-section{padding:16px;border-bottom:1px solid var(--border)}
.panel-section h4{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;font-weight:500}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg4);border-radius:10px;cursor:pointer;transition:background var(--transition)}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--text3);border-radius:50%;transition:all var(--transition)}
.toggle input:checked~.toggle-slider{background:var(--accent)}
.toggle input:checked~.toggle-slider:before{transform:translateX(16px);background:#fff}
.shortcut-list{list-style:none}
.shortcut-list li{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
.shortcut-list li:last-child{border-bottom:none}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition)}
.color-swatch:hover,.color-swatch.active{border-color:var(--text)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--bg3);border-radius:var(--radius);padding:10px;text-align:center}
.stat-num{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}

/* MAP */
#map-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;margin-bottom:16px}
#map-view{width:100%;height:300px;background:var(--bg3);border-radius:var(--radius);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.map-placeholder{text-align:center;color:var(--text3)}
.map-placeholder .map-icon{font-size:48px;margin-bottom:12px}
.map-location-tag{position:absolute;background:var(--accent);color:#0a0a0f;font-size:11px;padding:2px 6px;border-radius:4px;transform:translate(-50%,-100%);white-space:nowrap;font-weight:500}
.map-location-tag:after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--accent)}
.map-line{position:absolute;pointer-events:none}
.map-dot{position:absolute;width:10px;height:10px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);border:2px solid var(--bg)}

/* TOASTS */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);box-shadow:var(--shadow);font-size:13px;pointer-events:all;animation:slideIn 0.2s ease;max-width:320px}
.toast.success{border-color:var(--success);background:rgba(104,200,136,0.08)}
.toast.error{border-color:var(--danger);background:rgba(200,104,104,0.08)}
.toast.warn{border-color:var(--warn);background:rgba(200,164,104,0.08)}
.toast.info{border-color:var(--accent3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;max-width:520px;width:90%;box-shadow:var(--shadow);animation:fadeIn 0.2s ease}
.modal h2{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:8px}
.modal p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;border-radius:var(--radius);outline:none;margin-bottom:16px;transition:border-color var(--transition)}
.modal-input:focus{border-color:var(--accent)}
.modal textarea.modal-input{resize:vertical;min-height:100px}

/* HELP PANEL */
.help-section{padding:16px;font-size:13px;color:var(--text2);line-height:1.7}
.help-section h4{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text);margin:16px 0 6px}
.help-section h4:first-child{margin-top:0}
.help-section code{background:var(--bg4);padding:1px 5px;border-radius:4px;font-family:var(--font-mono);font-size:12px;color:var(--accent)}

/* PRESENTATION EXPORT */
@media print {
  body{background:#fff;color:#111}
  #app{display:none}
  #print-view{display:block!important}
}
#print-view{display:none;font-family:'Georgia',serif;max-width:800px;margin:0 auto;padding:40px}
.print-header{text-align:center;margin-bottom:40px;border-bottom:2px solid #c8a96e;padding-bottom:24px}
.print-header h1{font-size:36px;font-weight:300;letter-spacing:0.05em;margin-bottom:6px}
.print-header p{color:#666;font-size:14px}
.print-section{margin-bottom:32px}
.print-section-title{font-size:20px;font-weight:600;border-left:3px solid #c8a96e;padding-left:12px;margin-bottom:12px}
.print-item{padding:10px 0;border-bottom:1px solid #eee}
.print-item-title{font-weight:600;font-size:15px}
.print-item-meta{color:#888;font-size:12px;margin-top:2px}
.print-item-notes{color:#444;font-size:13px;margin-top:4px}
.print-footer{text-align:center;margin-top:40px;padding-top:16px;border-top:1px solid #eee;font-size:11px;color:#aaa}

/* PACKING LIST */
.packing-section{padding:12px}
.packing-category{margin-bottom:12px}
.packing-cat-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px;font-weight:500}
.packing-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.packing-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}
.packing-add{display:flex;gap:6px;margin-top:8px}
.packing-add input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:6px;outline:none}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;transition:all var(--transition);white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{width:0}
  #panel{width:0}
  #canvas{padding:12px}
  .canvas-title{font-size:20px}
}

/* AI MODE */
.ai-panel{padding:16px;background:linear-gradient(135deg,rgba(143,180,200,0.05),rgba(200,169,110,0.05));border:1px solid rgba(143,180,200,0.2);border-radius:var(--radius2);margin-bottom:16px}
.ai-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent3);margin-bottom:8px;font-weight:500}
.ai-panel textarea{width:100%;background:var(--bg3);border:1px solid rgba(143,180,200,0.2);color:var(--text);font-size:12px;padding:8px;border-radius:var(--radius);outline:none;resize:vertical;min-height:120px;font-family:var(--font-mono)}

/* CONFLICT WARNING */
.conflict-indicator{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(200,164,104,0.1);border:1px solid rgba(200,164,104,0.3);border-radius:var(--radius);font-size:12px;color:var(--warn);margin-bottom:8px}

/* UNDO STACK VISUAL */
.undo-indicator{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--text2);z-index:9000;animation:fadeIn 0.2s ease;pointer-events:none}

/* SECTION COLORS */
.color-picker-row{display:flex;gap:6px;margin-top:4px}
.color-dot-btn{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color var(--transition)}
.color-dot-btn:hover,.color-dot-btn.selected{border-color:var(--text)}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="brand" onclick="showAbout()" title="About Voyagr">Voyagr<span>itinerary design</span></div>
    <div class="mode-toggle">
      <button class="btn active" id="mode-structured" onclick="setMode('structured')" title="Structured day-by-day view">Structured</button>
      <button class="btn" id="mode-hybrid" onclick="setMode('hybrid')" title="Flexible hybrid view">Hybrid</button>
    </div>
    <div class="header-actions">
      <button class="btn ghost icon" onclick="toggleDark()" title="Toggle dark/light mode (Ctrl+D)" id="theme-btn">☀️</button>
      <button class="btn ghost" onclick="showHelp()" title="Help & shortcuts">? Help</button>
      <button class="btn ghost" onclick="loadDemo()" title="Load sample itinerary">Demo</button>
      <button class="btn ghost" onclick="duplicateTrip()" title="Duplicate trip (Ctrl+Shift+D)">⧉ Clone</button>
      <button class="btn" onclick="importFile()" title="Import save file">📂 Open</button>
      <button class="btn primary" onclick="saveFile()" title="Save to JSON (Ctrl+S)">💾 Save</button>
      <button class="btn ghost" onclick="exportPresentation()" title="Export as HTML presentation">📄 Export</button>
    </div>
  </div>

  <div id="main">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-header">
        <h3>Trip</h3>
        <div style="display:flex;gap:4px">
          <button class="btn icon ghost sm" onclick="togglePanel('settings')" title="Settings">⚙</button>
          <button class="btn icon ghost sm" onclick="addSection()" title="Add section (Ctrl+Shift+S)">+</button>
        </div>
      </div>
      <div class="trip-meta">
        <input class="trip-title-input" id="trip-title" placeholder="Trip Name..." value="" oninput="onTripChange()">
        <div class="trip-subtitle" id="trip-subtitle">Click to edit trip details</div>
        <div class="field-row">
          <div class="field-mini">
            <label>Start Date</label>
            <input type="date" id="trip-start" oninput="onTripChange()">
          </div>
          <div class="field-mini">
            <label>End Date</label>
            <input type="date" id="trip-end" oninput="onTripChange()">
          </div>
        </div>
        <div class="field-row" style="margin-top:8px">
          <div class="field-mini" style="flex:2">
            <label>Destination(s)</label>
            <input type="text" id="trip-dest" placeholder="e.g. Paris, Rome" oninput="onTripChange()">
          </div>
          <div class="field-mini">
            <label>Travelers</label>
            <input type="number" id="trip-travelers" min="1" value="1" oninput="onTripChange()" style="width:60px">
          </div>
        </div>
        <div class="field-row" style="margin-top:8px">
          <div class="field-mini">
            <label>Trip Notes</label>
            <textarea id="trip-notes" placeholder="Overall trip notes..." oninput="onTripChange()" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div id="section-nav" class="sidebar-sections"></div>
      <div class="sidebar-footer">
        ✦ Brewed with love by KT using Cursor<br>
        <span id="undo-count" style="color:var(--text3)">No changes yet</span>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas">
      <div class="canvas-header">
        <div>
          <div class="canvas-title" id="canvas-title">New <em>Itinerary</em></div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px" id="canvas-meta"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div id="conflict-summary"></div>
          <button class="btn sm" onclick="addSection()" title="Add section (Ctrl+Shift+S)">+ Section</button>
          <button class="btn sm" onclick="togglePanel('packing')" title="Packing list">🧳 Packing</button>
          <button class="btn sm" onclick="togglePanel('map')" title="Map view">🗺 Map</button>
          <button class="btn sm" onclick="togglePanel('stats')" title="Trip stats">📊 Stats</button>
        </div>
      </div>

      <div id="ai-panel" style="display:none">
        <div class="ai-panel">
          <div class="ai-label">🤖 AI Import Mode — Paste JSON itinerary data</div>
          <textarea id="ai-input" placeholder='{"trip":{"title":"My Trip"},"sections":[...]}'></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn primary sm" onclick="importFromAI()">Import JSON</button>
            <button class="btn sm" onclick="toggleAIMode()">Exit AI Mode</button>
            <button class="btn sm ghost" onclick="copySchema()">Copy Schema Docs</button>
          </div>
        </div>
      </div>

      <div id="sections-container"></div>

      <div style="text-align:center;padding:24px;color:var(--text3);font-size:13px" id="empty-state">
        <div style="font-size:40px;margin-bottom:12px">✦</div>
        <div style="font-family:var(--font-display);font-size:18px;font-weight:300;margin-bottom:6px">Begin designing your journey</div>
        <div>Add your first section, or load the demo itinerary to explore.</div>
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
          <button class="btn" onclick="addSection()">+ Add Section</button>
          <button class="btn" onclick="loadDemo()">Load Demo</button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="panel" class="hidden">
      <div id="panel-content"></div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <h2 id="modal-title">Confirm</h2>
    <p id="modal-body"></p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- PRINT VIEW -->
<div id="print-view"></div>

<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileLoad(event)">

<script>
// ============================================================
//  VOYAGR — Premium Travel Itinerary Design Platform
//  Version: 1.0.0
//  Architecture: Frontend-only, serverless, in-memory
// ============================================================

const VERSION = '1.0.0';

// ---- STATE ----
let state = {
  version: VERSION,
  trip: {
    title: '', dest: '', start: '', end: '', travelers: 1, notes: ''
  },
  sections: [],
  settings: {
    mode: 'structured',
    darkMode: true,
    showMap: false,
    showAssistant: true,
    aiMode: false,
    showConflicts: true,
    autoEmoji: true
  },
  ui: {
    expandedSections: {},
    expandedItems: {},
    activePanel: null,
    selectedSection: null
  },
  packing: []
};

let undoStack = [];
let redoStack = [];
let hasUnsaved = false;
let dragState = { type: null, id: null, sectionId: null };
const MAX_UNDO = 100;

// ---- EMOJI MAP ----
const EMOJI_MAP = {
  flight: '✈️', fly: '✈️', airport: '🛫', hotel: '🏨', stay: '🏨', hostel: '🛏️',
  restaurant: '🍽️', dinner: '🍽️', lunch: '🥗', breakfast: '☕', cafe: '☕', food: '🍜',
  museum: '🏛️', art: '🎨', gallery: '🖼️', tour: '🗺️', sightseeing: '👁️',
  beach: '🏖️', hiking: '🥾', hike: '🥾', mountain: '⛰️', park: '🌿',
  train: '🚄', bus: '🚌', car: '🚗', taxi: '🚕', ferry: '⛴️', cruise: '🚢',
  shopping: '🛍️', market: '🛒', spa: '💆', massage: '💆',
  theater: '🎭', concert: '🎵', show: '🎪', nightlife: '🌃',
  check: '📋', buffer: '⏸️', note: '📝', meeting: '🤝', activity: '🎯',
  visa: '🪪', document: '📄', packing: '🧳', transfer: '🔄',
  sunrise: '🌅', sunset: '🌇', photography: '📸', photo: '📸',
  wine: '🍷', bar: '🥂', coffee: '☕', tea: '🍵'
};

const CATEGORIES = ['Stay', 'Flight', 'Train', 'Transport', 'Restaurant', 'Activity', 'Sightseeing', 'Museum', 'Shopping', 'Beach', 'Hiking', 'Tour', 'Transfer', 'Buffer', 'Note', 'Meeting', 'Event', 'Other'];
const COLORS = ['#c8a96e','#8fb4c8','#a8c8a0','#c8a0a8','#a0a8c8','#c8b8a0','#90a0b0','#b8a0c8','#c8c0a0','#a0c8c0'];
const SECTION_COLORS = ['#c8a96e','#8fb4c8','#a8c8a0','#c8a0a8','#a0a8c8','#c8b8a0'];

// ---- LOGGING ----
const log = {
  info: (msg, data) => console.log(`[Voyagr][INFO] ${msg}`, data||''),
  warn: (msg, data) => console.warn(`[Voyagr][WARN] ${msg}`, data||''),
  error: (msg, data) => console.error(`[Voyagr][ERROR] ${msg}`, data||''),
  action: (action, data) => console.log(`[Voyagr][ACTION] ${action}`, data||'')
};

// ---- INIT ----
document.addEventListener('DOMContentLoaded', () => {
  log.info('Initializing Voyagr v'+VERSION);
  applyTheme();
  render();
  setupKeyboardShortcuts();
  setupBeforeUnload();
  updateUndoUI();
  log.info('Ready');
});

// ---- UNDO/REDO ----
function pushUndo(description) {
  undoStack.push({ description, state: deepClone(state) });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  hasUnsaved = true;
  updateUndoUI();
  log.action('Undo push: '+description);
}

function undo() {
  if (!undoStack.length) { toast('Nothing to undo', 'warn'); return; }
  redoStack.push(deepClone(state));
  state = undoStack.pop().state;
  hasUnsaved = true;
  render();
  updateUndoUI();
  showUndoIndicator('Undone');
  log.action('Undo');
}

function redo() {
  if (!redoStack.length) { toast('Nothing to redo', 'warn'); return; }
  undoStack.push(deepClone(state));
  state = redoStack.pop();
  hasUnsaved = true;
  render();
  updateUndoUI();
  showUndoIndicator('Redone');
  log.action('Redo');
}

function updateUndoUI() {
  const el = document.getElementById('undo-count');
  if (el) el.textContent = undoStack.length ? `${undoStack.length} changes` : 'No changes';
}

let undoIndicatorTimeout;
function showUndoIndicator(text) {
  const existing = document.getElementById('undo-indicator');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'undo-indicator';
  el.className = 'undo-indicator';
  el.textContent = text;
  document.body.appendChild(el);
  clearTimeout(undoIndicatorTimeout);
  undoIndicatorTimeout = setTimeout(() => el.remove(), 1500);
}

// ---- DEEP CLONE ----
function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// ---- ID GENERATION ----
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// ---- THEME ----
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.settings.darkMode ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = state.settings.darkMode ? '☀️' : '🌙';
}

function toggleDark() {
  state.settings.darkMode = !state.settings.darkMode;
  applyTheme();
  log.action('Toggle theme: '+( state.settings.darkMode?'dark':'light'));
}

// ---- MODE ----
function setMode(mode) {
  pushUndo('Switch mode to '+mode);
  state.settings.mode = mode;
  document.getElementById('mode-structured').classList.toggle('active', mode==='structured');
  document.getElementById('mode-hybrid').classList.toggle('active', mode==='hybrid');
  render();
  toast('Switched to '+mode+' mode', 'info');
  log.action('Mode: '+mode);
}

// ---- TRIP CHANGE ----
function onTripChange() {
  state.trip.title = document.getElementById('trip-title').value;
  state.trip.start = document.getElementById('trip-start').value;
  state.trip.end = document.getElementById('trip-end').value;
  state.trip.dest = document.getElementById('trip-dest').value;
  state.trip.travelers = parseInt(document.getElementById('trip-travelers').value)||1;
  state.trip.notes = document.getElementById('trip-notes').value;
  updateCanvasHeader();
  renderSectionNav();
  hasUnsaved = true;
}

function updateCanvasHeader() {
  const t = state.trip;
  const titleEl = document.getElementById('canvas-title');
  if (titleEl) {
    if (t.title) titleEl.innerHTML = `<em>${escHtml(t.title)}</em>`;
    else titleEl.innerHTML = 'New <em>Itinerary</em>';
  }
  const metaEl = document.getElementById('canvas-meta');
  if (metaEl) {
    const parts = [];
    if (t.dest) parts.push('📍 '+t.dest);
    if (t.start && t.end) parts.push('🗓 '+formatDateRange(t.start, t.end));
    else if (t.start) parts.push('🗓 From '+formatDate(t.start));
    if (t.travelers > 1) parts.push('👥 '+t.travelers+' travelers');
    metaEl.textContent = parts.join(' · ');
  }
}

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d+'T00:00:00');
  return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function formatDateRange(s, e) {
  return formatDate(s)+' → '+formatDate(e);
}

// ---- SECTIONS ----
function addSection(name) {
  pushUndo('Add section');
  const id = genId();
  const colorIndex = state.sections.length % SECTION_COLORS.length;
  const section = {
    id, name: name||'New Section',
    color: SECTION_COLORS[colorIndex],
    notes: '', items: []
  };
  state.sections.push(section);
  state.ui.expandedSections[id] = true;
  render();
  updateEmptyState();
  toast('Section added', 'success');
  log.action('Add section', {id});
  // Focus name input
  setTimeout(() => {
    const input = document.getElementById('section-name-'+id);
    if (input) { input.focus(); input.select(); }
  }, 50);
  return section;
}

function deleteSection(id) {
  const sec = state.sections.find(s=>s.id===id);
  showConfirm(
    `Delete "${sec?.name||'Section'}"?`,
    'All items in this section will be deleted. This cannot be undone after save.',
    [
      { label: 'Delete', class: 'danger', action: () => {
        pushUndo('Delete section');
        state.sections = state.sections.filter(s=>s.id!==id);
        delete state.ui.expandedSections[id];
        render(); updateEmptyState();
        toast('Section deleted', 'success');
        log.action('Delete section', {id});
      }},
      { label: 'Cancel', class: '', action: null }
    ]
  );
}

function duplicateSection(id) {
  pushUndo('Duplicate section');
  const sec = state.sections.find(s=>s.id===id);
  if (!sec) return;
  const newSec = deepClone(sec);
  newSec.id = genId();
  newSec.name = sec.name + ' (copy)';
  newSec.items = newSec.items.map(item => ({ ...item, id: genId() }));
  const idx = state.sections.indexOf(sec);
  state.sections.splice(idx+1, 0, newSec);
  state.ui.expandedSections[newSec.id] = true;
  render(); updateEmptyState();
  toast('Section duplicated', 'success');
  log.action('Duplicate section', {from:id, to:newSec.id});
}

function updateSectionName(id, name) {
  const sec = state.sections.find(s=>s.id===id);
  if (sec) { sec.name = name; renderSectionNav(); hasUnsaved = true; }
}

function updateSectionNotes(id, notes) {
  const sec = state.sections.find(s=>s.id===id);
  if (sec) { sec.notes = notes; hasUnsaved = true; }
}

function updateSectionColor(id, color) {
  pushUndo('Change section color');
  const sec = state.sections.find(s=>s.id===id);
  if (sec) { sec.color = color; renderSectionNav(); render(); }
}

function toggleSection(id) {
  state.ui.expandedSections[id] = !state.ui.expandedSections[id];
  const body = document.getElementById('sec-body-'+id);
  const toggle = document.getElementById('sec-toggle-'+id);
  if (body) body.classList.toggle('hidden', !state.ui.expandedSections[id]);
  if (toggle) toggle.classList.toggle('collapsed', !state.ui.expandedSections[id]);
}

// ---- ITEMS ----
function createItem(sectionId, type) {
  pushUndo('Add item');
  const sec = state.sections.find(s=>s.id===sectionId);
  if (!sec) return;
  const id = genId();
  const emoji = getEmojiForType(type||'Activity');
  const item = {
    id, sectionId,
    title: '',
    category: type||'Activity',
    emoji, emojiOverride: false,
    location: '', date: '', timeStart: '', timeEnd: '',
    notes: '', color: COLORS[0],
    attachments: [],
    alternatives: [],
    multiDay: false, dateEnd: '',
    collapsed: false
  };
  sec.items.push(item);
  state.ui.expandedItems[id] = true;
  renderSection(sectionId);
  updateEmptyState();
  hasUnsaved = true;
  toast(getEmojiForType(type||'Activity')+' Item added', 'success');
  log.action('Add item', {id, type, sectionId});
  setTimeout(() => {
    const input = document.getElementById('item-title-'+id);
    if (input) input.focus();
  }, 50);
  return item;
}

function deleteItem(id, sectionId) {
  pushUndo('Delete item');
  const sec = state.sections.find(s=>s.id===sectionId);
  if (!sec) return;
  sec.items = sec.items.filter(i=>i.id!==id);
  delete state.ui.expandedItems[id];
  renderSection(sectionId);
  updateEmptyState();
  toast('Item deleted', 'success');
  log.action('Delete item', {id, sectionId});
}

function duplicateItem(id, sectionId) {
  pushUndo('Duplicate item');
  const sec = state.sections.find(s=>s.id===sectionId);
  if (!sec) return;
  const item = sec.items.find(i=>i.id===id);
  if (!item) return;
  const newItem = deepClone(item);
  newItem.id = genId();
  newItem.title = item.title + ' (copy)';
  const idx = sec.items.indexOf(item);
  sec.items.splice(idx+1, 0, newItem);
  state.ui.expandedItems[newItem.id] = true;
  renderSection(sectionId);
  toast('Item duplicated', 'success');
  log.action('Duplicate item', {from:id, to:newItem.id});
}

function moveItemToSection(itemId, fromSectionId, toSectionId) {
  if (fromSectionId === toSectionId) return;
  pushUndo('Move item to section');
  const fromSec = state.sections.find(s=>s.id===fromSectionId);
  const toSec = state.sections.find(s=>s.id===toSectionId);
  if (!fromSec||!toSec) return;
  const item = fromSec.items.find(i=>i.id===itemId);
  if (!item) return;
  fromSec.items = fromSec.items.filter(i=>i.id!==itemId);
  item.sectionId = toSectionId;
  toSec.items.push(item);
  renderSection(fromSectionId);
  renderSection(toSectionId);
  toast('Item moved', 'success');
  log.action('Move item', {itemId, from:fromSectionId, to:toSectionId});
}

function toggleItem(id) {
  state.ui.expandedItems[id] = !state.ui.expandedItems[id];
  const body = document.getElementById('item-body-'+id);
  if (body) body.classList.toggle('open', state.ui.expandedItems[id]);
}

function updateItemField(id, sectionId, field, value) {
  const sec = state.sections.find(s=>s.id===sectionId);
  if (!sec) return;
  const item = sec.items.find(i=>i.id===id);
  if (!item) return;
  item[field] = value;
  hasUnsaved = true;
  if (field === 'category' && !item.emojiOverride && state.settings.autoEmoji) {
    item.emoji = getEmojiForType(value);
    const emojiEl = document.getElementById('item-emoji-'+id);
    if (emojiEl) emojiEl.textContent = item.emoji;
  }
  if (field === 'title' && !item.emojiOverride && state.settings.autoEmoji) {
    const newEmoji = getEmojiForTitle(value) || getEmojiForType(item.category);
    if (newEmoji !== item.emoji) {
      item.emoji = newEmoji;
      const emojiEl = document.getElementById('item-emoji-'+id);
      if (emojiEl) emojiEl.textContent = item.emoji;
    }
  }
  if (['date','timeStart','timeEnd'].includes(field)) {
    checkConflicts(sectionId);
  }
  updateItemBadges(id, item);
}

function updateItemBadges(id, item) {
  const timeEl = document.getElementById('item-time-badge-'+id);
  const locEl = document.getElementById('item-loc-badge-'+id);
  if (timeEl) {
    const t = formatItemTime(item);
    timeEl.textContent = t;
    timeEl.style.display = t ? '' : 'none';
  }
  if (locEl) {
    locEl.textContent = item.location ? '📍 '+item.location : '';
    locEl.style.display = item.location ? '' : 'none';
  }
}

function addAttachment(itemId, sectionId) {
  const input = document.getElementById('att-input-'+itemId);
  const url = input?.value?.trim();
  if (!url) return;
  pushUndo('Add attachment');
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  item.attachments = item.attachments||[];
  item.attachments.push({ label: url, url });
  input.value = '';
  renderItemAttachments(itemId, item);
  hasUnsaved = true;
  toast('Link added', 'success');
}

function removeAttachment(itemId, sectionId, idx) {
  pushUndo('Remove attachment');
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  item.attachments.splice(idx, 1);
  renderItemAttachments(itemId, item);
  hasUnsaved = true;
}

function renderItemAttachments(itemId, item) {
  const container = document.getElementById('attachments-'+itemId);
  if (!container) return;
  container.innerHTML = (item.attachments||[]).map((a,i) => `
    <div class="attachment-item">
      <span>🔗</span>
      <a href="${escHtml(a.url)}" target="_blank">${escHtml(a.label||a.url)}</a>

// ---- ALTERNATIVES ----
function addAlternative(itemId, sectionId) {
  pushUndo('Add alternative');
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  if ((item.alternatives||[]).length >= 3) { toast('Max 3 alternatives', 'warn'); return; }
  item.alternatives = item.alternatives||[];
  item.alternatives.push({ id: genId(), title: '', notes: '', active: false });
  renderItemAlternatives(itemId, item);
  hasUnsaved = true;
}

function setActiveAlt(itemId, sectionId, altId) {
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  item.alternatives.forEach(a => a.active = (a.id===altId));
  renderItemAlternatives(itemId, item);
  hasUnsaved = true;
}

function removeAlt(itemId, sectionId, altId) {
  pushUndo('Remove alternative');
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  item.alternatives = item.alternatives.filter(a=>a.id!==altId);
  renderItemAlternatives(itemId, item);
  hasUnsaved = true;
}

function renderItemAlternatives(itemId, item) {
  const container = document.getElementById('alts-'+itemId);
  if (!container) return;
  const alts = item.alternatives||[];
  container.innerHTML = alts.map(a => `
    <div class="alt-card ${a.active?'active':''}">
      <input class="alt-title-input" placeholder="Alternative option..." value="${escHtml(a.title)}"
        oninput="updateAlt('${itemId}','${item.sectionId}','${a.id}','title',this.value)">
      ${a.active ? '<span style="position:absolute;top:6px;right:6px;font-size:11px;color:var(--success)">✓ Active</span>' : `<button class="btn sm ghost alt-active-btn" onclick="setActiveAlt('${itemId}','${item.sectionId}','${a.id}')">Set Active</button>`}
      <br>
      <textarea class="alt-notes" rows="2" placeholder="Notes..."
        oninput="updateAlt('${itemId}','${item.sectionId}','${a.id}','notes',this.value)">${escHtml(a.notes)}</textarea>
      <button class="btn sm danger" onclick="removeAlt('${itemId}','${item.sectionId}','${a.id}')" style="margin-top:4px">Remove</button>
    </div>
  `).join('');
}

function updateAlt(itemId, sectionId, altId, field, value) {
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  const alt = item.alternatives?.find(a=>a.id===altId);
  if (alt) { alt[field] = value; hasUnsaved = true; }
}

// ---- EMOJI ----
function getEmojiForType(type) {
  const key = type.toLowerCase();
  for (const [k,v] of Object.entries(EMOJI_MAP)) {
    if (key.includes(k)) return v;
  }
  return '📌';
}

function getEmojiForTitle(title) {
  const lower = title.toLowerCase();
  for (const [k,v] of Object.entries(EMOJI_MAP)) {
    if (lower.includes(k)) return v;
  }
  return null;
}

function promptEmojiOverride(itemId, sectionId) {
  const sec = state.sections.find(s=>s.id===sectionId);
  const item = sec?.items.find(i=>i.id===itemId);
  if (!item) return;
  showInputModal('Change Emoji', 'Enter an emoji for this item:', item.emoji, (val) => {
    if (!val.trim()) return;
    pushUndo('Change emoji');
    item.emoji = val.trim();
    item.emojiOverride = true;
    const el = document.getElementById('item-emoji-'+itemId);
    if (el) el.textContent = item.emoji;
    hasUnsaved = true;
  });
}

// ---- CONFLICTS ----
function checkConflicts(sectionId) {
  const sec = state.sections.find(s=>s.id===sectionId);
  if (!sec || !state.settings.showConflicts) return;
  const timedItems = sec.items.filter(i=>i.date&&i.timeStart&&i.timeEnd);
  const conflicts = new Set();
  for (let i=0; i<timedItems.length; i++) {
    for (let j=i+1; j<timedItems.length; j++) {
      const a=timedItems[i], b=timedItems[j];
      if (a.date===b.date && hasTimeOverlap(a.timeStart,a.timeEnd,b.timeStart,b.timeEnd)) {
        conflicts.add(a.id); conflicts.add(b.id);
      }
    }
  }
  sec.items.forEach(item => {
    const badge = document.getElementById('conflict-'+item.id);
    if (badge) badge.style.display = conflicts.has(item.id) ? '' : 'none';
  });
  const summary = document.getElementById('conflict-summary');
  const total = getAllConflicts();
  if (summary) {
    if (total>0) summary.innerHTML = `<span class="item-badge" style="background:rgba(200,164,104,0.15);border-color:var(--warn);color:var(--warn)">⚠️ ${total} conflict${total>1?'s':''}</span>`;
    else summary.innerHTML = '';
  }
}

function getAllConflicts() {
  let total = 0;
  state.sections.forEach(sec => {
    const timedItems = sec.items.filter(i=>i.date&&i.timeStart&&i.timeEnd);
    for (let i=0; i<timedItems.length; i++) {
      for (let j=i+1; j<timedItems.length; j++) {
        const a=timedItems[i], b=timedItems[j];
        if (a.date===b.date && hasTimeOverlap(a.timeStart,a.timeEnd,b.timeStart,b.timeEnd)) total++;
      }
    }
  });
  return total;
}

function hasTimeOverlap(s1,e1,s2,e2) {
  return s1<e2 && e1>s2;
}

function formatItemTime(item) {
  if (!item.timeStart && !item.timeStart && !item.date) return '';
  const parts = [];
  if (item.date) parts.push(formatDate(item.date));
  if (item.timeStart) {
    let t = item.timeStart;
    if (item.timeEnd) t += ' – '+item.timeEnd;
    parts.push(t);
  }
  return parts.join(' ');
}

// ---- DRAG & DROP SECTIONS ----
function setupSectionDragDrop() {
  const container = document.getElementById('sections-container');
  if (!container) return;
  const sections = container.querySelectorAll('.section-block');
  sections.forEach(sec => {
    const handle = sec.querySelector('.section-drag-handle');
    if (!handle) return;
    handle.addEventListener('dragstart', (e) => {
      dragState = { type: 'section', id: sec.dataset.sectionId };
      sec.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      log.info('Drag section start', dragState.id);
    });
    handle.addEventListener('dragend', () => {
      sec.classList.remove('dragging');
      container.querySelectorAll('.section-block').forEach(s=>s.classList.remove('drag-over'));
    });
    sec.addEventListener('dragover', (e) => {
      if (dragState.type !== 'section' || dragState.id === sec.dataset.sectionId) return;
      e.preventDefault();
      container.querySelectorAll('.section-block').forEach(s=>s.classList.remove('drag-over'));
      sec.classList.add('drag-over');
    });
    sec.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragState.type !== 'section') return;
      sec.classList.remove('drag-over');
      const fromId = dragState.id;
      const toId = sec.dataset.sectionId;
      if (fromId===toId) return;
      pushUndo('Reorder sections');
      const from = state.sections.findIndex(s=>s.id===fromId);
      const to = state.sections.findIndex(s=>s.id===toId);
      const [item] = state.sections.splice(from, 1);
      state.sections.splice(to, 0, item);
      render();
      log.action('Section reorder', {from:fromId, to:toId});
    });
  });
}

// ---- DRAG & DROP ITEMS ----
function setupItemDragDrop(sectionId) {
  const list = document.getElementById('items-'+sectionId);
  if (!list) return;
  list.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      if (e.target.classList.contains('section-drag-handle')) return;
      dragState = { type: 'item', id: card.dataset.itemId, sectionId };
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      list.querySelectorAll('.item-card').forEach(c=>{
        c.classList.remove('drag-over-top','drag-over-bottom');
      });
    });
    card.addEventListener('dragover', (e) => {
      if (dragState.type !== 'item') return;
      e.preventDefault(); e.stopPropagation();
      list.querySelectorAll('.item-card').forEach(c=>{c.classList.remove('drag-over-top','drag-over-bottom');});
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      card.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault(); e.stopPropagation();
      if (dragState.type !== 'item') return;
      list.querySelectorAll('.item-card').forEach(c=>{c.classList.remove('drag-over-top','drag-over-bottom');});
      const fromId = dragState.id;
      const fromSecId = dragState.sectionId;
      const toId = card.dataset.itemId;
      if (fromId===toId) return;
      pushUndo('Reorder items');
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      const insertBefore = e.clientY < mid;
      if (fromSecId === sectionId) {
        const sec = state.sections.find(s=>s.id===sectionId);
        const from = sec.items.findIndex(i=>i.id===fromId);
        const to = sec.items.findIndex(i=>i.id===toId);
        const [item] = sec.items.splice(from, 1);
        const newTo = sec.items.findIndex(i=>i.id===toId);
        sec.items.splice(insertBefore ? newTo : newTo+1, 0, item);
        renderSection(sectionId);
      } else {
        moveItemToSection(fromId, fromSecId, sectionId);
      }
      log.action('Item reorder', {from:fromId, to:toId, section:sectionId});
    });
  });
}

// ---- SAVE / LOAD ----
function saveFile() {
  try {
    const saveData = {
      ...deepClone(state),
      savedAt: new Date().toISOString(),
      schemaVersion: '1.0'
    };
    const json = JSON.stringify(saveData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const tripName = state.trip.title || 'itinerary';
    a.href = url;
    a.download = `voyagr-${tripName.replace(/[^a-z0-9]/gi,'_').toLowerCase()}-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    hasUnsaved = false;
    toast('✓ Itinerary saved successfully', 'success');
    log.info('Save file exported');
  } catch (err) {
    log.error('Save failed', err);
    toast('Save failed: '+err.message, 'error');
  }
}

function importFile() {
  document.getElementById('file-input').click();
}

function handleFileLoad(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sections || !data.trip) throw new Error('Invalid Voyagr save file format');
      pushUndo('Load file');
      state = {
        version: data.version || VERSION,
        trip: data.trip || {},
        sections: data.sections || [],
        settings: { ...state.settings, ...(data.settings||{}) },
        ui: data.ui || { expandedSections:{}, expandedItems:{}, activePanel:null },
        packing: data.packing || []
      };
      applyTheme();
      render();
      hasUnsaved = false;
      toast('✓ Itinerary loaded: '+( state.trip.title||'Untitled'), 'success');
      log.info('File loaded', { title: state.trip.title });
    } catch (err) {
      log.error('Load failed', err);
      toast('Failed to load file: '+err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function duplicateTrip() {
  pushUndo('Duplicate trip');
  state.trip.title = (state.trip.title||'Trip') + ' (copy)';
  state.sections = deepClone(state.sections).map(sec => ({
    ...sec, id: genId(),
    items: sec.items.map(item => ({ ...item, id: genId() }))
  }));
  render();
  toast('Trip duplicated in memory', 'success');
  log.action('Duplicate trip');
}

// ---- PANELS ----
function togglePanel(type) {
  const panel = document.getElementById('panel');
  if (state.ui.activePanel === type) {
    panel.classList.add('hidden');
    state.ui.activePanel = null;
    return;
  }
  state.ui.activePanel = type;
  panel.classList.remove('hidden');
  renderPanel(type);
}

function renderPanel(type) {
  const content = document.getElementById('panel-content');
  if (!content) return;
  switch(type) {
    case 'settings': content.innerHTML = renderSettingsPanel(); break;
    case 'packing': content.innerHTML = renderPackingPanel(); break;
    case 'map': content.innerHTML = renderMapPanel(); break;
    case 'stats': content.innerHTML = renderStatsPanel(); break;
    case 'help': content.innerHTML = renderHelpPanel(); break;
    default: content.innerHTML = '';
  }
}

  const item = state.packing.find(p=>p.id===id);

function removePackingItem(id) {
  state.packing = state.packing.filter(p=>p.id!==id);

  const cat = document.getElementById('packing-cat-input')?.value?.trim()||'Essentials';

function exportPresentation() {
  const html = buildPresentationHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `voyagr-${(state.trip.title||'itinerary').replace(/[^a-z0-9]/gi,'_').toLowerCase()}-presentation.html`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Presentation exported', 'success');
  log.info('Presentation exported');
}

// ---- MODAL HELPERS ----
function showModal(title, bodyHtml, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  const actionsEl = document.getElementById('modal-actions');
  actionsEl.innerHTML = '';
  (actions||[]).forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn '+(a.class||'');
    btn.textContent = a.label;
    btn.onclick = () => { closeModal(); if (a.action) a.action(); };
    actionsEl.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
}

function showConfirm(title, body, actions) {
  showModal(title, `<p>${body}</p>`, actions);
}

function showInputModal(title, body, defaultVal, onConfirm) {
  const id = 'modal-input-'+genId();
  showModal(title, `<p>${body}</p><input class="modal-input" id="${id}" value="${escHtml(defaultVal||'')}">`, [
    { label: 'Confirm', class: 'primary', action: () => {
      const val = document.getElementById(id)?.value;
      onConfirm(val||'');
    }},
    { label: 'Cancel', class: '', action: null }
  ]);
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) { el.focus(); el.select(); }
  }, 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ---- TOASTS ----
function toast(msg, type='info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type==='success'?'✓':type==='error'?'✕':type==='warn'?'⚠️':'ℹ️';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ---- KEYBOARD SHORTCUTS ----
function setupKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    const ctrl = e.ctrlKey || e.metaKey;
    const shift = e.shiftKey;
    const tag = e.target.tagName.toLowerCase();
    const isInput = ['input','textarea','select'].includes(tag);
    if (ctrl && e.key === 's') { e.preventDefault(); saveFile(); }
    if (ctrl && !shift && e.key === 'z') { e.preventDefault(); undo(); }
    if (ctrl && shift && e.key === 'Z') { e.preventDefault(); redo(); }
    if (ctrl && shift && e.key === 'S' && !isInput) { e.preventDefault(); addSection(); }
    if (ctrl && e.key === 'd' && !isInput) { e.preventDefault(); toggleDark(); }
    if (ctrl && shift && e.key === 'D') { e.preventDefault(); duplicateTrip(); }
    if (ctrl && e.key === 'e') { e.preventDefault(); exportPresentation(); }
    if (ctrl && e.key === '/') { e.preventDefault(); showHelp(); }
    if (e.key === 'Escape') closeModal();
  });
}

// ---- BEFORE UNLOAD ----
function setupBeforeUnload() {
  window.addEventListener('beforeunload', (e) => {
    if (!hasUnsaved) return;
    e.preventDefault();
    e.returnValue = '';
  });
}

// ---- AI MODE ----
function toggleAIMode() {
  state.settings.aiMode = !state.settings.aiMode;
  const panel = document.getElementById('ai-panel');
  if (panel) panel.style.display = state.settings.aiMode ? '' : 'none';
  toast(state.settings.aiMode ? '🤖 AI Mode enabled' : 'AI Mode disabled', 'info');
  log.action('AI Mode: '+state.settings.aiMode);
}

function importFromAI() {
  const input = document.getElementById('ai-input')?.value?.trim();
  if (!input) { toast('No JSON provided', 'warn'); return; }
  try {
    const data = JSON.parse(input);
    if (data.trip || data.sections) {
      pushUndo('AI import');
      if (data.trip) state.trip = { ...state.trip, ...data.trip };
      if (data.sections) state.sections = data.sections;
      render();
      toast('✓ AI import successful', 'success');
      log.action('AI import', { sections: state.sections.length });
    } else throw new Error('Missing trip or sections');
  } catch (err) {
    log.error('AI import failed', err);
    toast('Import failed: '+err.message, 'error');
  }
}

function copySchema() {
  const schema = getSchemaDoc();
  navigator.clipboard?.writeText(schema).then(()=>toast('Schema copied to clipboard','success')).catch(()=>toast('Copy failed — see console','error'));
  console.log('[Voyagr][SCHEMA]', schema);
}

// ---- HELPERS ----
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
